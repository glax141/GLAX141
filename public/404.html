<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLAX - 页面跳转中...</title>
  <script>
    // GitHub Pages SPA 重定向脚本
    // 将路径存储到 sessionStorage，然后跳转到首页
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') +
      '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      color: #fff;
    }
    .loading {
      text-align: center;
      letter-spacing: 0.3em;
      font-size: 12px;
      opacity: 0.5;
      text-transform: uppercase;
    }
    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 0.2em;
      margin-bottom: 20px;
      opacity: 0.9;
    }
    .dots {
      display: inline-block;
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div>
    <div class="logo">GLAX</div>
    <div class="loading">页面跳转中 Redirecting<span class="dots">...</span></div>
  </div>
</body>
</html>
