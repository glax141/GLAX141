<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLAX - 商业/时尚摄影师 | Commercial Fashion Photographer</title>
    <meta name="description" content="GLAX - 商业时尚摄影师，专注于人像、服装、产品摄影" />
    
    <!-- 性能优化：DNS 预解析 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- 性能优化：预加载关键资源 -->
    <link rel="preload" href="/images/lookbook/cover.jpg" as="image" fetchpriority="high">
    
    <!-- 性能优化：浏览器缓存控制 -->
    <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;200;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
      /* 首屏加载样式 - 避免白屏 */
      body { margin: 0; background: #000; }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #000;
      }
      #root:empty::after {
        content: 'GLAX';
        color: rgba(255,255,255,0.15);
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: 0.3em;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.4; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
